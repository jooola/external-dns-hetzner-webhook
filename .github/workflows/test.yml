name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: e2e k8s-${{ matrix.k8s }}
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    strategy:
      fail-fast: false # Continue tests matrix if a flaky run occurs.
      matrix:
        k8s:
          - 1.32
          - 1.33
          - 1.34

    env:
      KUBERNETES_VERSION: ${{ matrix.k8s }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install test tools
        env:
          CRANE_VERSION: v0.20.6 # renovate: datasource=github-releases depName=google/go-containerregistry
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          go install github.com/google/go-containerregistry/cmd/crane@$CRANE_VERSION

      - uses: hetznercloud/tps-action@main

      - name: Run tests
        run: make test-coverage

      - name: upload coverage reports to codecov
        if: >
          !startswith(github.head_ref, 'renovate/') &&
          !startswith(github.head_ref, 'releaser-pleaser--')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.codecov_token }}
