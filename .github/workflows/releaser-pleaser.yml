name: Releaser-pleaser

on:
  push:
    branches: [main]
  pull_request_target:
    types:
      - edited
      - labeled
      - unlabeled

concurrency:
  group: releaser-pleaser
  cancel-in-progress: true

jobs:
  releaser-pleaser:
    # Do not run on forks.
    if: github.repository == 'hetzner/external-dns-hetzner-webhook'

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: releaser-pleaser
        uses: apricote/releaser-pleaser@v0.8.0
        with:
          token: ${{ secrets.HCLOUD_BOT_TOKEN }}
          extra-files: |
            internal/version/version.go
            docs/guides/quickstart.md
